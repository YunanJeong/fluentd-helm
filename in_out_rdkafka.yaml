image:
  registry: docker.wai
  repository: bitnamilegacy/fluentd-rdkafka
  tag: 1.17.1


forwarder:
  enabled: false

## Aggregator parameters
##
aggregator:
  enabled: true
  replicaCount: 1


  ## @param aggregator.extraGems List of extra gems to be installed. Can be used to install additional fluentd plugins.
  ##
  extraGems: []
    # - name: fluent-plugin-beats 
    #   version: 2.1.2
  ## @param aggregator.configFile Name of the config file that will be used by Fluentd at launch under the `/opt/bitnami/fluentd/conf` directory
  ##
  configFile: fluentd.conf
  ## @param aggregator.configMap Name of the config map that contains the Fluentd configuration files
  ##
  configMap: ""
  ## @param aggregator.configMapFiles [object] Files to be added to be config map. Ignored if `aggregator.configMap` is set
  ##
  configMapFiles:
    # лФФнПінКЄ confнММмЭЉмЧР нЕМмК§нКЄ л∞П л™®лЛИнД∞лІБ лУ± кЄ∞л≥ЄкЄ∞лК•мЭД мЬДнХЬ мД§м†ХмЭі нПђнХ®лР®
    # лФФнПінКЄ confлВімЪ© мВ≠м†ЬмЛЬ, valueнММмЭЉмЧРмДЬ кіАл†®кЄ∞лК• нФДл°ЬнНЉнЛ∞л•Љ м∞ЊмХД disabledнХім§ШмХЉ мЧРлЯђл∞©мІАлР®
    
    # :9880  # kubeletмЭі нЧђмК§м≤інБђ(Probe)нХШл†§к≥† httpGetнХ† мИШ мЮИлПДл°Э м†Ьк≥µнХШлКФ нПђнКЄ
             # POSTл°Ь jsonл∞ЫмЬЉл©і stdout(podл°ЬкЈЄ)л°Ь лЭДмЫМм£ЉлѓАл°Ь нЕМмК§нКЄмЪ©лПДл°Ь к≤ЄмВђк≤ЄмВђ мВђмЪ©к∞АлК•
             # fluentd pod кіАл¶ђмЧР мВђмЪ©лРШлѓАл°Ь, мЛ§м†Ь л©ФмЛЬмІАлКФ л≥ДлПД http portл•Љ нЩЬмЪ©нХШмЮР
    # :24224 # fluentbit or fluentdл°ЬлґАнД∞ лН∞мЭінД∞л•Љ л∞ЫкЄ∞мЬДнХЬ нПђнКЄ. tagк∞А мЬ†мІАлР®.
    # :24231 # мЩЄлґА Prometheusк∞А fluentdмЭШ л©ФнКЄл¶≠мЭД Pull RequestнХ† мИШ мЮИлПДл°Э м†Ьк≥µнХШлКФ нПђнКЄ
    fluentd.conf: |
      # Ignore fluentd own events
      <match fluent.**>
        @type null
      </match>

      # @include kafka-produce.conf

      # @include kafka-consume.conf
      
      @include rdkafka-consume-group.conf

      
      @include fluentd-inputs.conf
      @include fluentd-output.conf
      {{- if .Values.metrics.enabled }}
      @include metrics.conf
      {{- end }}



    rdkafka-consume-group.conf: |

      <source>
        @type rdkafka_group  # Consume plugin

        topics kfk.fltd.test0,kfk.fltd.test1       # rdkafkaмЧРмД† regex лѓЄмІАмЫР # topicл™ЕмЭі tagл°Ь мВђмЪ©лР®
        format json                            # text|json|ltsv|msgpack   # default: json

        # kafka recordмЭШ keyлПД нЩЬмЪ©нХШкЄ∞
        # record key нЕНмК§нКЄл•Љ fluentd мЭіл≤§нКЄмЭШ мІАм†ХнХЬ нХДлУЬк∞Т("record_key")мЬЉл°Ь м†АмЮ•. 
        kafka_message_key record_key   # Optional. formatмШµмЕШк≥Љ нХ®кїШ мВђмЪ©. 

        # Kafka Consumer Optionsл•Љ кЈЄлМАл°Ь мУЄ мИШ мЮИлКФ к≤ГмЬЉл°Ь л≥імЮД.
        kafka_configs {
          "bootstrap.servers": "source-kafka.kafka.svc.cluster.local:9092",
          "group.id": "consumer-group-name"
        }
      </source>

      <match kfk.fltd.*>
        @type stdout

        # consumer-group мВђмЪ©мЛЬ kafkaмЄ°мЧРмДЬ offset кіАл¶ђнХШлѓАл°Ь file buffer мЧЖмЦілПДлР®
        <buffer>
          @type memory
          flush_mode interval
          flush_interval 2s
          flush_thread_count 4
          chunk_limit_size 2MB #as small as possible
          total_limit_size 4GB
          retry_max_interval 30 
          retry_forever true
        </buffer>
      </match>

    rdkafka-produce.conf: |
      <source>
        # in_http нФМлЯђкЈЄмЭЄ: sourceмДємЕШмЧРмДЬ tagмІАм†Х лґИк∞А
        # URL subpathк∞А source tagл°Ь мЈ®кЄЙлР®
        # e.g) <fluentd_ip>:8888/kafka.produce
        @type http   
        bind 0.0.0.0
        port 8888
      </source>

      <match kafka.produce>
        @type rdkafka2  # Produce plugin   
        brokers my-kfk-kafka.default.svc.cluster.local:9092  # мљ§лІИл°Ь мЧђлЯђ м£ЉмЖМ мІАм†Х к∞АлК•(failureмЛЬ мВђмЪ©лР®)
        default_topic produce-target-topicname                         # л©АнЛ∞нЖ†нФљ лґИк∞А, нХДмЪФмЛЬ tag routingмЬЉл°Ь к∞Ьл≥Дм≤Шл¶ђ

        # jsonлІМ л∞ЫлКФлЛ§ (default: json)
        <format>
          @type json
        </format>
        
        # file л≤ДнНЉ: мХИм†ХмД±, нЩХмЮ•мД± м§СмЛЬ => лИДлЭљ мЫРм≤Ьм∞®лЛ®, кЈЉлН∞ лКРл¶Љ (лЭЉмЭілЄМмЛЬ, pv нЩЬмД±нЩФ нХДмЪФ) (л©АнЛ∞мљФмЦімЛЬ, л≤ДнНЉнММмЭЉ мЛЭл≥ДмЮР нСЬкЄ∞ нХДмЪФ)
        # memory л≤ДнНЉ: мЖНлПД м§СмЛЬ => лє†л¶Д, лИДлЭљмЬДнЧШ
        <buffer>
          @type file
          path "/opt/bitnami/fluentd/logs/buffers/kafka.produce.buffer#{worker_id}"   # /opt/bitnami/fluentd/logs/buffersкєМмІАлКФ м∞®нКЄмЧРмДЬ к∞Хм†ЬнХШлКФ PVк≤љл°Ь
          flush_interval 1s
          flush_thread_count 5
          chunk_limit_size 512kb 
          total_limit_size 64GB   # Default: 512MB (memory) / 64GB (file)
          retry_max_interval 30s
        </buffer>
      </match>

    fluentd-inputs.conf: |
      # TCP input to receive logs from
      {{- if .Values.aggregator.port }}
      <source>
        @type forward
        bind 0.0.0.0
        port {{ .Values.aggregator.port }}
        {{- if .Values.tls.enabled }}
        <transport tls>
          ca_path /opt/bitnami/fluentd/certs/in_forward/ca.crt
          cert_path /opt/bitnami/fluentd/certs/in_forward/tls.crt
          private_key_path /opt/bitnami/fluentd/certs/in_forward/tls.key
          client_cert_auth true
        </transport>
        {{- end }}
      </source>
      {{- end }}

      # HTTP input for the liveness and readiness probes
      <source>
        @type http
        bind 0.0.0.0
        port 9880
      </source>
    fluentd-output.conf: |
      # Throw the healthcheck to the standard output
      <match fluentd.healthcheck>
        @type stdout
      </match>

      # Send the logs to the standard output
      <match **>
        @type stdout
      </match>
    metrics.conf: |
      # Prometheus Exporter Plugin
      # input plugin that exports metrics
      <source>
        @type prometheus
        port {{ .Values.metrics.service.port }}
      </source>

      # input plugin that collects metrics from MonitorAgent
      <source>
        @type prometheus_monitor
        <labels>
          host ${hostname}
        </labels>
      </source>

      # input plugin that collects metrics for output plugin
      <source>
        @type prometheus_output_monitor
        <labels>
          host ${hostname}
        </labels>
      </source>
  
  ## @param aggregator.port Port the Aggregator container will listen for logs. Leave it blank to ignore.
  ## You can specify other ports in the aggregator.containerPorts parameter
  ##
  port: 24224
  ## @param aggregator.extraArgs Extra arguments for the Fluentd command line
  ## ref: https://docs.fluentd.org/deployment/command-line-option
  ##
  extraArgs: ""
  ## @param aggregator.extraEnvVars Extra environment variables to pass to the container
  ## extraEnvVars:
  ##   - name: MY_ENV_VAR
  ##     value: my_value
  ##
  extraEnvVars: []
  ## @param aggregator.extraEnvVarsCM Name of existing ConfigMap containing extra env vars for Fluentd Aggregator nodes
  ##
  extraEnvVarsCM: ""
  ## @param aggregator.extraEnvVarsSecret Name of existing Secret containing extra env vars for Fluentd Aggregator nodes
  ##
  extraEnvVarsSecret: ""
  ## @param aggregator.containerPorts [array] Ports the aggregator containers will listen on
  ##
  containerPorts:
    # - name: my-port
    #   containerPort: 24222
    #   protocol: TCP
    - name: http
      containerPort: 9880
      protocol: TCP
    - name: test
      containerPort: 8888
      protocol: TCP
  ## Service parameters
  ##
  service:
    ## @param aggregator.service.type Kubernetes service type (`ClusterIP`, `NodePort`, or `LoadBalancer`) for the aggregators
    ##
    type: LoadBalancer
    ## @param aggregator.service.ports [object] Array containing the aggregator service ports
    ##
    ports:
      http:
        port: 9880
        targetPort: http
        protocol: TCP
      tcp:
        port: 24224
        targetPort: tcp
        protocol: TCP
      test:
        port: 8888
        targetPort: test
        protocol: TCP

    loadBalancerIP: ""
    loadBalancerSourceRanges: []
    clusterIP: ""
    annotations: {}
    externalTrafficPolicy: Cluster
    sessionAffinity: None
    sessionAffinityConfig: {}
    annotationsHeadless: {}


  ingress:
    enabled: false
  
  startupProbe:
    enabled: false

  livenessProbe:
    enabled: true
    httpGet:
      path: /fluentd.healthcheck?json=%7B%22ping%22%3A+%22pong%22%7D
      port: http
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1

  readinessProbe:
    enabled: false

  updateStrategy:
    type: RollingUpdate

  resources: {}

  nodeSelector: {}
  
  autoscaling:
    enabled: false

  ## Persist data to a persistent volume
  ##
  persistence:
    enabled: false
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    ## @param aggregator.persistence.selector Selector to match an existing Persistent Volume (this value is evaluated as a template)
    ## selector:
    ##   matchLabels:
    ##     app: my-app
    selector: {}
    ## @param aggregator.persistence.annotations Persistent Volume Claim annotations
    ##
    annotations: {}


  sidecars: []

  initContainers: # []
    - name: install-offline-plugins
      image: '{{ include "fluentd.aggregator.image" . }}'  # лПЩмЭЉ мЭілѓЄмІА tpl
      imagePullPolicy: IfNotPresent
      # л™Ел†ємЦі Permission Denied л∞©мІА
      securityContext:
        allowPrivilegeEscalation: false
        runAsUser: 0
      command: [sh, -c]
      args:
        - |-
          # install gems in Init Container
          fluent-gem install /plugins/*.gem

          # copy installed gems to shared dir
          cp -r /opt/bitnami/fluentd/extensions/* /extensions/
          cp -r /opt/bitnami/fluentd/gems/* /gems/
          cp -r /opt/bitnami/fluentd/specifications/* /specifications

      # init ContainerмЧР Volume мґФк∞А(лІИмЪінКЄ)
      volumeMounts:
        # л°Ьмїђ мД§мєШнММмЭЉмЭД init containerмЧР лУ±л°Э
        - name: local-gems
          mountPath: /plugins         # init container лВілґА к≤љл°Ь
        # App Container, Init Container к∞Д к≥µмЬ† л≥Љл•®
        - name: shared-dir  
          mountPath: /extentions      # init container лВілґА к≤љл°Ь
          subPath: extentions         # л≥Љл•® лВі мДЬлЄМк≤љл°Ь лІ§мє≠
        - name: shared-dir     
          mountPath: /gems            # init container лВілґА к≤љл°Ь
          subPath: gems               # л≥Љл•® лВі мДЬлЄМк≤љл°Ь лІ§мє≠
        - name: shared-dir
          mountPath: /specifications  # init container лВілґА к≤љл°Ь
          subPath: specifications     # л≥Љл•® лВі мДЬлЄМк≤љл°Ь лІ§мє≠

  # мГИ л≥Љл•®мЭД м†ХмЭШнХ† лХМ мВђмЪ©
  extraVolumes: # []
    # л°ЬмїђнШЄмК§нКЄ(Node)мЩА Init Container к∞Д к≥µмЬ† л≥Љл•®
    - name: local-gems
      hostPath:     
        type: Directory
        path: /etc/plugins  # л°ЬмїђнШЄмК§нКЄ к≤љл°Ь
    # App Container, Init Container к∞Д к≥µмЬ† л≥Љл•®
    - name: shared-dir
      emptyDir: {}  
      
  # м†ХмЭШлРЬ л≥Љл•®мЭД мї®нЕМмЭілДИ лВілґА к≤љл°ЬмЧР лІИмЪінКЄнХ† лХМ мВђмЪ©
  extraVolumeMounts: # []
    - name: shared-dir
      mountPath: /opt/bitnami/fluentd/extensions/      # App. Container лВілґА к≤љл°Ь
      subPath: extensions
    - name: shared-dir
      mountPath: /opt/bitnami/fluentd/gems/            # App. Container лВілґА к≤љл°Ь
      subPath: gems
    - name: shared-dir
      mountPath: /opt/bitnami/fluentd/specifications/  # App. Container лВілґА к≤љл°Ь
      subPath: specifications

   
  extraVolumeClaimTemplates: []
  initScripts: {}
  initScriptsCM: ""
  initScriptsSecret: ""

## Prometheus Exporter / Metrics
##
metrics:
  enabled: false

tls:
  enabled: false
